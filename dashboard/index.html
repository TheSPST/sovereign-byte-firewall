<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Firewall Dashboard</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="container">
        <!-- Header -->
        <header class="glass-panel header">
            <div class="logo">
                <div class="status-orb" id="status-orb"></div>
                <h1>SOVEREIGN <span class="highlight">BYTE</span></h1>
            </div>
            <div class="connection-status" id="connection-status">Connecting to Engine...</div>
        </header>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="glass-panel stat-card">
                <h3>Byte Anomalies (Zero-Day)</h3>
                <div class="stat-value" id="stat-byte">0</div>
            </div>
            <div class="glass-panel stat-card">
                <h3>Rate Anomalies (DDoS)</h3>
                <div class="stat-value" id="stat-rate">0</div>
            </div>
            <div class="glass-panel stat-card">
                <h3>Highest Surprise (bits)</h3>
                <div class="stat-value" id="stat-max-entropy">0.00</div>
            </div>
        </div>

        <!-- Byte Surprise Heatmap -->
        <div class="glass-panel heatmap-panel" id="heatmap-panel" style="margin-bottom:24px;">
            <div class="panel-header">
                <h2>Byte Surprise Heatmap — what the model saw</h2>
                <span id="heatmap-caption" style="color:var(--text-secondary);font-family:var(--font-mono);font-size:0.85em;">no flagged window yet</span>
            </div>
            <canvas id="heatmap-canvas" width="768" height="384" style="width:100%;height:auto;display:block;border-radius:8px;background:#0a0a12;"></canvas>
            <div id="heatmap-tooltip" style="position:fixed;pointer-events:none;display:none;background:rgba(10,10,18,0.95);border:1px solid var(--glass-border);color:var(--text-primary);font-family:var(--font-mono);font-size:0.8em;padding:6px 8px;border-radius:6px;z-index:50;"></div>
        </div>

        <!-- Main Dashboard -->
        <div class="main-dashboard">
            <div class="glass-panel live-log-container">
                <div class="panel-header">
                    <h2>Live Threat Stream</h2>
                    <button id="clear-logs" class="btn-clear">Clear</button>
                </div>
                <div class="log-headers">
                    <span>TIMESTAMP</span>
                    <span>TYPE</span>
                    <span>SEVERITY / SCORE</span>
                    <span>MESSAGE</span>
                </div>
                <div id="live-logs" class="logs">
                    <div class="log-entry system-msg">
                        <span class="time">-</span>
                        <span class="type">SYSTEM</span>
                        <span class="score">-</span>
                        <span class="msg">Awaiting WebSocket Connection...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

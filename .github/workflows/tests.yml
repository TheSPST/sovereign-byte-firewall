name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: System deps for scapy
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Install torch (CPU wheel -- no GPU on CI runners)
        run: python -m pip install --upgrade pip && pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install remaining dependencies
        run: pip install -r requirements.txt

      - name: Run test suite
        run: pytest tests/ -v
